name: Deploy to GitHub Pages via gh-pages branch

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo root (debug)
        run: |
          echo "===== repo root listing ====="
          ls -la
          if [ -f index.html ]; then echo "index.html found"; else echo "index.html NOT found"; fi

      - name: Create .nojekyll to skip Jekyll processing
        run: |
          touch .nojekyll
          ls -la .nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .   # 若你的網站在 ./build，改成 ./build
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
