    <script>

        // ===== 讀取 URL 參數 =====
        // window.location.search 是網址裡 ? 之後的部分，例如 "?stage=1-2-1"
        // URLSearchParams 把它解析成可以用 .get() 查詢的格式
        // params.get("stage") 取出 stage 的值，存進 stageId
        const params = new URLSearchParams(window.location.search)

        const stageId = params.get("stage")  //***********************

        //檢查是否存在下一關卡得flag
        let next_stage_is_exists = true

        // ===== 注音對照表 =====
        // key 是鍵盤按鍵，value 是對應的注音符號
        const bopomofo = {
            "1":"ㄅ","q":"ㄆ","a":"ㄇ","z":"ㄈ",
            "2":"ㄉ","w":"ㄊ","s":"ㄋ","x":"ㄌ",
            "e":"ㄍ","d":"ㄎ","c":"ㄏ",
            "r":"ㄐ","f":"ㄑ","v":"ㄒ",
            "5":"ㄓ","t":"ㄔ","g":"ㄕ","b":"ㄖ",
            "y":"ㄗ","h":"ㄘ","n":"ㄙ",
            "u":"ㄧ","j":"ㄨ","m":"ㄩ",
            "8":"ㄚ","i":"ㄛ","k":"ㄜ",",":"ㄝ",
            "9":"ㄞ","o":"ㄟ","l":"ㄠ",".":"ㄡ",
            "0":"ㄢ","p":"ㄣ",";":"ㄤ","/":"ㄥ",
            "-":"ㄦ","3":"ˇ","4":"ˋ","7":"˙","6":"ˊ", " ":" ", "Enter":"↵","<":"，","(":"（", ")":"）",
            "[":"「", "]":"」","\\":"、", ":":"：", ">":"。","!":"！"
        }


        // ===== 遊戲狀態變數 =====
        let target = ""          // 這關要打的字串，例如 "ㄑㄨㄑㄨ"
        let current = 0          // 目前指到第幾個字（從 0 開始）
        let wrong_input = false  // 目前是否處於打錯卡住的狀態
        let wrong_key_times = 0  // 總共打錯幾次
        let target_get = 0       // 總共打對幾個字
        let isRunning = false    // 計時是否已經開始
        let startTime = null     // 開始的時間點（毫秒）
        let boxes = []           // 存所有方框 div 的陣列，方便用 boxes[0] boxes[1] 取得



        // ===== FindStage：在 Level_Data 裡找到對應的關卡資料 =====
        function FindStage(id) {
            // 第一層：跑 Level_Data 的每個 key（easy / medium / hard）
            for (const diff in Level_Data) {
                // 第二層：跑該難度的每個章節
                for (const chapter of Level_Data[diff].chapter) {
                    // 有些章節可能沒有 stage（例如 hard），跳過
                    if (!chapter.stage) continue
                    // 第三層：跑該章節的每個關卡
                    for (const stage of chapter.stage) {
                        // 找到 id 符合的那筆，立刻回傳，迴圈停止
                        if (stage.id === id) return stage
                    }
                }
            }
            return null  // 找不到就回傳 null
        }


        // ===== Init：初始化畫面，每次「再試一次」也會呼叫這裡 （渲染關卡）=====

        function Init() {
            // Find_next_game()
            // if(next_stage_is_exists){
            //     document.querySelector(".next_game_btn").style.display = "block";

            // }
            // else{
            //     document.querySelector(".next_game_btn").style.display = "none";

            // }
            // 用 FindStage 找到這關的資料
            const stage = FindStage(stageId)

            const game_retry_btn = document.querySelector(".game_retry_btn");
            game_retry_btn.display = "block";


            //找不到就顯示錯誤訊息，停止執行
            if (!stage) {
                document.getElementById("game_stage_name").textContent = "找不到關卡：" + stageId
                return
            }
            if(!stage.name3){
                document.getElementById("game_stage_name3").style.display = "none";
            }
            else{
                document.getElementById("game_stage_name3").style.display = "flex";
                document.getElementById("game_stage_name3").textContent = stage.name3

            }

            //關卡id和名稱顯示在畫面上
            document.getElementById("game_stage_id").textContent = stage.id
            document.getElementById("game_stage_name").textContent = stage.name + (stage.name2 ? " " + stage.name2 : "")

            // 把 target 設成這關的練習字串
            // 如果 stage.target 是空的，就用空字串
            target = stage.target || ""

            //重置狀態
            current = 0
            wrong_input = false
            wrong_key_times = 0
            target_get = 0
            isRunning = false
            startTime = null

            //隱藏結果畫面（移除 show class）
            document.getElementById("game_result").classList.remove("show")

            // 清空方框區，準備重建
            const container = document.getElementById("game_char_container")
            container.innerHTML = ""
            boxes = []



            // 把target字串拆成每個字 每個字建一個方框 div
            // split("") 把字串拆成陣列，例如 "ㄑㄨ" → ["ㄑ","ㄨ"]

            //介紹部分拆出來
            if(stage.type === "基本介紹"){
                const hint = document.querySelector(".game_input_hint")
                hint.style.display = "none";
                
                game_retry_btn.style.display = "none";

                if(stage.id === "1-1-1"){
                    game_char_container.innerHTML = `
                    <div style="text-align: left; max-width: 900px; margin: 0 auto; font-family: 'Noto Serif TC', serif;color: white;font-weight: 150;position: relative;font-size: 0.9rem">
                        <p style="font-size: 1.4rem; color: #c9a84c; text-align: center; margin-bottom: 1.5rem; font-weight: 500;">
                            開始打字的第一步：摸到那條「線」
                        </p>

                else{

            }

            // 空白鍵預設會讓頁面捲動，這裡阻止這個預設行為
            if (key === " ") event.preventDefault()

            if (key === "Backspace"){
                if (wrong_input) {
                    // 目前打錯卡住：清除錯誤狀態，恢復金框
                    wrong_input = false
                    boxes[current].classList.remove("wrong")

                // 沒有打錯：往前退一格

                current--

                boxes[current].classList.remove("correct")

                return
            }

            }

                    boxes[current].classList.add("current")
                } else {
                    // 已經是最後一格，顯示結果
                    ShowResult()
                }
            } else {
                //打錯
                wrong_key_times++   //錯誤次數 +1
                wrong_input = true  //設為卡住
                boxes[current].classList.remove("current")  //移除金框
                boxes[current].classList.add("wrong")       //紅框
            }
        })


        // nit初始化建畫面＃＃＃
        Init()
    
    </script>
